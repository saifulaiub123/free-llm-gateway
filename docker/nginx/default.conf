# nginx config for the Free LLM Gateway client SPA.
# Serves static files only. The SPA calls the API at api.llm.scraperq.com directly
# (cross-origin — CORS is configured on the server).

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
