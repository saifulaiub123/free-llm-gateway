# nginx config for the Free LLM Gateway client SPA.
# Proxies /api/ and /v1/ to the NestJS server (same origin, no CORS needed).
#
# __API_SERVER__ is replaced at container startup by envsubst using the
# API_SERVER_HOST environment variable. Set this in Dokploy's client service
# environment to the server's internal hostname, e.g.:
#   API_SERVER_HOST=http://<server-service-name>:5001
# Default: http://gateway:5001

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS resolver so hostnames are resolved at runtime,
    # not at nginx startup. This allows the server container to start in any order.
    resolver 127.0.0.11 valid=10s;

    # --- Reverse proxy: management API ---
    location /api/ {
        proxy_pass __API_SERVER__;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Reverse proxy: OpenAI-compatible gateway ---
    location /v1/ {
        proxy_pass __API_SERVER__;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Reverse proxy: Swagger docs ---
    location /api/docs {
        proxy_pass __API_SERVER__;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /v1/docs {
        proxy_pass __API_SERVER__;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # --- Health endpoint (to distinguish nginx health from server health) ---
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
    }

    # --- SPA fallback: serve index.html for all non-file routes ---
    location / {
        try_files $uri $uri/ /index.html;
    }
}
