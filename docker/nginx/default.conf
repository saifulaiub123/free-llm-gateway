# nginx config for the Free LLM Gateway client SPA.
# Proxies /api/ and /v1/ to the NestJS server so both client and API
# are on the same origin (no CORS needed).
#
# In Dokploy, set $api_server to the server's internal hostname.
# Dokploy service discovery typically uses the service name.
# Override via: docker run -e API_SERVER_HOST=http://gateway:5001 ...

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Resolve the API server address at runtime via environment variable.
    # Default expects the Dokploy server service to be reachable as "gateway:5001".
    set $api_server "${API_SERVER_HOST:-http://gateway:5001}";

    # --- Reverse proxy: management API ---
    location /api/ {
        proxy_pass $api_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Reverse proxy: OpenAI-compatible gateway ---
    location /v1/ {
        proxy_pass $api_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Reverse proxy: Swagger docs ---
    location /api/docs {
        proxy_pass $api_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /v1/docs {
        proxy_pass $api_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # --- SPA fallback: serve index.html for all non-file routes ---
    location / {
        try_files $uri $uri/ /index.html;
    }
}
